<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<title>Ricettario</title>
<style>
:root {
  --bg: #f7f5f0;
  --bg2: #ffffff;
  --bg3: #eeece7;
  --text: #1a1a1a;
  --text2: #555550;
  --text3: #999990;
  --border: #e0ded8;
  --accent: #2d6a4f;
  --accent2: #52b788;
  --accent-bg: #d8f3dc;
  --danger: #c0392b;
  --danger-bg: #fdecea;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; font-size: 15px; }

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; position: relative; }
#content { flex: 1; overflow-y: auto; padding: 16px 16px 80px; }
#nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 12px; border: none; background: none; color: var(--text3); font-size: 10px; cursor: pointer; gap: 4px; transition: color .15s; }
.nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-btn.active { color: var(--accent); }
.nav-btn.add-btn .add-circle { width: 46px; height: 46px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -10px; }
.nav-btn.add-btn .add-circle svg { width: 24px; height: 24px; stroke: white; }
.nav-btn.add-btn span { font-size: 10px; color: var(--text3); }

/* HEADER */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.search-box { display: flex; align-items: center; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; gap: 8px; margin-bottom: 14px; }
.search-box svg { width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 2; flex-shrink: 0; }
.search-box input { border: none; background: none; flex: 1; font-size: 14px; color: var(--text); outline: none; }

/* CARDS */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .15s; }
.card:active { border-color: var(--accent2); }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.card-sub { font-size: 12px; color: var(--text3); }
.card-row { display: flex; align-items: center; justify-content: space-between; }
.badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .3px; }
.badge-main { background: #dbeafe; color: #1e40af; }
.badge-colazione { background: #fef3c7; color: #92400e; }
.badge-spuntino { background: #f3e8ff; color: #6b21a8; }
.macro-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.macro-chip { font-size: 11px; color: var(--text2); background: var(--bg3); padding: 3px 7px; border-radius: 20px; }
.macro-chip span { font-weight: 600; color: var(--text); }
.empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
.empty-state svg { width: 48px; height: 48px; stroke: var(--border); fill: none; stroke-width: 1.5; margin: 0 auto 12px; display: block; }
.empty-state p { font-size: 14px; }

/* FORMS */
.form-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.form-section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 14px; }
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
input[type=text], input[type=number], select, textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; background: var(--bg); color: var(--text); outline: none; font-family: inherit;
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent2); }
textarea { resize: none; min-height: 70px; line-height: 1.5; }
.input-row { display: flex; gap: 8px; }
.input-row .field { flex: 1; }
.macro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 18px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s, transform .1s; font-family: inherit; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: white; width: 100%; }
.btn-danger { background: var(--danger-bg); color: var(--danger); }
.btn-ghost { background: var(--bg3); color: var(--text2); }
.btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* TYPE SELECTOR */
.type-selector { display: flex; gap: 8px; }
.type-btn { flex: 1; padding: 9px 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; text-align: center; transition: all .15s; font-family: inherit; }
.type-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }

/* INGREDIENT SEARCH */
.ing-search-wrap { position: relative; }
.ing-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); z-index: 50; max-height: 200px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
.ing-option { padding: 10px 12px; font-size: 14px; cursor: pointer; border-bottom: 1px solid var(--border); }
.ing-option:last-child { border-bottom: none; }
.ing-option:active { background: var(--bg3); }

/* INGREDIENT LIST IN RECIPE */
.ing-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; }
.ing-item-name { flex: 1; font-size: 14px; font-weight: 500; }
.ing-item-qty { font-size: 13px; color: var(--text2); background: var(--bg3); padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
.ing-remove { width: 28px; height: 28px; border: none; background: none; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
.ing-remove svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

/* MACRO TOTALS */
.macro-totals { background: var(--accent-bg); border: 1px solid var(--accent2); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.macro-totals-title { font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.macro-grid-display { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.macro-stat { text-align: center; }
.macro-stat-val { font-size: 18px; font-weight: 700; color: var(--text); }
.macro-stat-lbl { font-size: 10px; color: var(--text2); margin-top: 1px; }
.macro-extra-row { display: flex; gap: 8px; margin-top: 8px; justify-content: center; flex-wrap: wrap; }

/* STEPS */
.step-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; }
.step-num { width: 24px; height: 24px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
.step-body { flex: 1; }
.step-text-input { width: 100%; border: none; background: none; font-size: 13px; color: var(--text); outline: none; font-family: inherit; line-height: 1.5; resize: none; min-height: 36px; }
.step-time-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
.step-time-row input[type=number] { width: 60px; padding: 4px 8px; font-size: 12px; }
.step-time-row label { font-size: 12px; color: var(--text3); margin: 0; font-weight: 400; }
.step-actions { display: flex; flex-direction: column; gap: 4px; }
.step-action-btn { width: 28px; height: 28px; border: none; background: none; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-family: inherit; }
.step-action-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }

/* GROUPS */
.groups-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.group-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1.5px solid var(--border); background: var(--bg); color: var(--text2); cursor: pointer; transition: all .15s; font-family: inherit; }
.group-chip.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.groups-ref-btn { font-size: 12px; color: var(--accent); background: none; border: none; cursor: pointer; text-decoration: underline; margin-top: 8px; font-family: inherit; display: block; }
.groups-ref { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-top: 8px; display: none; }
.groups-ref.open { display: block; }
.group-ref-item { margin-bottom: 10px; font-size: 13px; }
.group-ref-item:last-child { margin-bottom: 0; }
.group-ref-name { font-weight: 600; margin-bottom: 2px; }
.group-ref-desc { color: var(--text2); font-size: 12px; line-height: 1.4; }

/* UNITS */
.unit-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
.unit-row input { flex: 1; }
.unit-remove { width: 30px; height: 30px; border: none; background: none; color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; flex-shrink: 0; }

/* DETAIL VIEW */
.detail-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
.detail-section { margin-bottom: 20px; }
.detail-section-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.step-display { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); }
.step-display:last-child { border-bottom: none; }
.back-btn { display: flex; align-items: center; gap: 6px; color: var(--text2); font-size: 14px; background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 16px; font-family: inherit; }
.back-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
.ing-display-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.ing-display-row:last-child { border-bottom: none; }

/* BACKUP */
.backup-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.backup-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.backup-section p { font-size: 13px; color: var(--text2); margin-bottom: 12px; line-height: 1.5; }

/* TOAST */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity .2s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; }
.modal-overlay.hidden { display: none; }
.modal { background: var(--bg2); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 480px; margin: 0 auto; padding: 20px 16px 32px; max-height: 80vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

/* MISC */
.auto-note { font-size: 11px; color: var(--accent); margin-top: 4px; }
.importance-wrap { display: flex; align-items: center; gap: 10px; }
.importance-wrap input[type=range] { flex: 1; }
.importance-val { font-size: 13px; font-weight: 600; min-width: 28px; text-align: right; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<body>
<div id="app">
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" id="nav-ricette" onclick="goTo('ricette')">
      <svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14"/><path d="M9 3v16"/><rect x="4" y="17" width="16" height="4" rx="1"/></svg>
      Ricette
    </button>
    <button class="nav-btn" id="nav-ingredienti" onclick="goTo('ingredienti')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      Ingredienti
    </button>
    <button class="nav-btn add-btn" id="nav-add" onclick="showAddMenu()">
      <div class="add-circle">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </div>
      <span>Aggiungi</span>
    </button>
    <button class="nav-btn" id="nav-backup" onclick="goTo('backup')">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Backup
    </button>
  </nav>
</div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-content"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DB ────────────────────────────────────────────────────────────────────
let db;
const DB_NAME = 'ricettario', DB_VER = 1;

function initDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('ingredients')) d.createObjectStore('ingredients', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('recipes')) d.createObjectStore('recipes', { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = () => rej(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

function dbPut(store, obj) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(obj);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

function dbDelete(store, id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(id);
    req.onsuccess = () => res();
    req.onerror = () => rej(req.error);
  });
}

// ── STATE ─────────────────────────────────────────────────────────────────
let currentPage = 'ricette';
let ingredients = [], recipes = [];

// Form nuova ricetta
let newRecipeIngredients = [];
let newRecipeSteps = [];
let newRecipeType = 'main';
let selectedIngId = null;
let dragSrcIdx = null;

// Form nuovo ingrediente
let editingGroups = [];
let units = [];
let scalabile = true;

// ── COSTANTI ──────────────────────────────────────────────────────────────
const GROUPS = [
  { id: 'structure',  label: 'Struttura',    emoji: '🧱', desc: 'Dà forma e consistenza alla ricetta. Es: farine, avena, uova, proteine in polvere.' },
  { id: 'liquid',     label: 'Liquido',      emoji: '💧', desc: 'Idrata e influenza la morbidezza. Es: acqua, latte, yogurt, albumi.' },
  { id: 'fat',        label: 'Grasso',       emoji: '🧈', desc: 'Morbidezza, sapore e texture. Es: olio, burro, frutta secca.' },
  { id: 'sweetener',  label: 'Dolcificante', emoji: '🍯', desc: 'Aggiunge dolcezza, spesso influenza anche la struttura. Es: zucchero, miele, sciroppi.' },
  { id: 'protein',    label: 'Proteina',     emoji: '🍗', desc: 'Contribuisce a struttura o apporto proteico. Es: carne, pesce, uova, whey.' },
  { id: 'fiber',      label: 'Fibra',        emoji: '🌾', desc: 'Migliora la qualità nutrizionale e assorbe liquidi. Es: farina integrale, avena, legumi.' },
  { id: 'leavening',  label: 'Lievitante',   emoji: '🧪', desc: 'Fa crescere il volume. Molto sensibile, quasi sempre non scalabile. Es: lievito, bicarbonato.' },
  { id: 'vegetable',  label: 'Verdura',      emoji: '🥦', desc: 'Verdure e ortaggi. Aggiungono volume, micronutrienti e idratazione. Es: zucchina, spinaci, carota.' },
  { id: 'fruit',      label: 'Frutta',       emoji: '🍎', desc: 'Frutta fresca. Dolcezza naturale, liquidi e fibre. Es: banana, mela, frutti di bosco.' },
  { id: 'seasoning',  label: 'Condimento',   emoji: '🧂', desc: 'Aromi, spezie e condimenti. Importanza quasi sempre bassa. Es: sale, pepe, curcuma, erbe.' },
  { id: 'dairy',      label: 'Latticino',    emoji: '🥛', desc: 'Prodotti caseari, spesso anche liquido o grasso. Es: latte, yogurt, ricotta, formaggio.' },
  { id: 'nut',        label: 'Frutta secca', emoji: '🌰', desc: 'Frutta secca e semi, spesso anche grasso o proteina. Es: mandorle, noci, semi di chia.' },
  { id: 'carb',       label: 'Carboidrato',  emoji: '🍝', desc: 'Carboidrati complessi cotti. Es: pasta, riso, pane, patate.' },
];

// ── HELPERS ───────────────────────────────────────────────────────────────
function genId(name) {
  return name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '') + '_' + Date.now().toString(36);
}

function calcMacros(ingList) {
  const t = { P: 0, C: 0, F: 0, kcal: 0, fiber: 0, sugar: 0 };
  ingList.forEach(i => {
    const ing = ingredients.find(x => x.id === i.ingredient_id);
    if (!ing) return;
    const q = i.qty_g;
    t.P    += q * (ing.protein_per_g || 0);
    t.C    += q * (ing.carbs_per_g   || 0);
    t.F    += q * (ing.fat_per_g     || 0);
    t.kcal += q * (ing.kcal_per_g    || 0);
    t.fiber += q * (ing.fiber_per_g  || 0);
    t.sugar += q * (ing.sugar_per_g  || 0);
  });
  return t;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function setNavActive(page) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = { ricette: 'nav-ricette', ingredienti: 'nav-ingredienti', backup: 'nav-backup' };
  if (map[page]) document.getElementById(map[page]).classList.add('active');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

function svgIcon(type) {
  const icons = {
    back:   `<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 18 9 12 15 6"/></svg>`,
    trash:  `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
    copy:   `<svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
    drag:   `<svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg>`,
    plus:   `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round"><path d="M12 5v14M5 12h14"/></svg>`,
    search: `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,
    book:   `<svg viewBox="0 0 24 24" style="width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5"><path d="M4 19V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14"/><path d="M9 3v16"/><rect x="4" y="17" width="16" height="4" rx="1"/></svg>`,
    apple:  `<svg viewBox="0 0 24 24" style="width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>`,
  };
  return icons[type] || '';
}

// ── NAVIGAZIONE ───────────────────────────────────────────────────────────
function goTo(page) {
  currentPage = page;
  setNavActive(page);
  render();
}

function render() {
  const c = document.getElementById('content');
  if (currentPage === 'ricette')              renderRicette(c);
  else if (currentPage === 'ingredienti')     renderIngredienti(c);
  else if (currentPage === 'nuova-ricetta')   renderNuovaRicetta(c);
  else if (currentPage === 'nuovo-ingrediente') renderNuovoIngrediente(c);
  else if (currentPage === 'backup')          renderBackup(c);
  else if (currentPage.startsWith('ricetta-'))     renderDettaglioRicetta(c, currentPage.replace('ricetta-', ''));
  else if (currentPage.startsWith('ingrediente-')) renderDettaglioIngrediente(c, currentPage.replace('ingrediente-', ''));
}

// ── NUOVA RICETTA ─────────────────────────────────────────────────────────
function saveRecipeFormState() {
  return {
    name: (document.getElementById('r-name') || {}).value || '',
  };
}

function restoreRecipeFormState(s) {
  if (!s) return;
  const el = document.getElementById('r-name');
  if (el) el.value = s.name;
}
function renderNuovaRicetta(c) {
  const m = calcMacros(newRecipeIngredients);
  c.innerHTML = `

    <div class="form-section">
      <div class="form-section-title">Informazioni base</div>
      <div class="field">
        <label>Nome ricetta *</label>
        <input type="text" id="r-name" placeholder="Es. Banana bread fit">
      </div>
      <div class="field">
        <label>Tipo</label>
        <div class="type-selector">

          <button class="type-btn ${newRecipeType === 'colazione' ? 'active' : ''}" onclick="setRecipeType('colazione')">☕ Colazione</button>
          <button class="type-btn ${newRecipeType === 'spuntino'  ? 'active' : ''}" onclick="setRecipeType('spuntino')">🥜 Spuntino</button>
        </div>
      </div>
    </div>

    <div class="macro-totals">
      <div class="macro-totals-title">Macro live</div>
      <div class="macro-grid-display">
        <div class="macro-stat"><div class="macro-stat-val" id="live-kcal">${Math.round(m.kcal)}</div><div class="macro-stat-lbl">kcal</div></div>
        <div class="macro-stat"><div class="macro-stat-val" id="live-P">${m.P.toFixed(1)}g</div><div class="macro-stat-lbl">Proteine</div></div>
        <div class="macro-stat"><div class="macro-stat-val" id="live-C">${m.C.toFixed(1)}g</div><div class="macro-stat-lbl">Carbo</div></div>
      </div>
      <div class="macro-extra-row">
        <span class="macro-chip">G <span id="live-F">${m.F.toFixed(1)}</span>g</span>
        <span class="macro-chip">Fibre <span id="live-fib">${m.fiber.toFixed(1)}</span>g</span>
        <span class="macro-chip">Zuccheri <span id="live-sug">${m.sugar.toFixed(1)}</span>g</span>
      </div>
    </div>

      <div class="form-section-title">Ingredienti</div>

          return `<div class="ing-item">
            <span class="ing-item-name">${ing ? ing.name : i.ingredient_id}</span>

        }).join('')}
      </div>

        <div class="ing-dropdown" id="ing-dropdown" style="display:none"></div>
      </div>
      <div id="qty-row" style="display:none;margin-top:10px">
        <div class="input-row">
          <div class="field">
            <label>Quantità (g) *</label>
            <input type="number" id="ing-qty" placeholder="100" min="0.1" step="0.1">
          </div>
          <div class="field">
            <label>Importanza</label>
            <div class="importance-wrap">
              <input type="range" min="0.3" max="1.5" step="0.1" value="1.0" id="ing-imp"
                oninput="document.getElementById('imp-val').textContent=this.value">
              <span class="importance-val" id="imp-val">1.0</span>
            </div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="addIngToRecipe()">${svgIcon('plus')} Aggiungi ingrediente</button>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Procedimento</div>
      <div id="steps-list">
        ${newRecipeSteps.map((s, idx) => renderStepItem(s, idx)).join('')}
      </div>
      <button class="btn btn-ghost" style="width:100%;margin-top:4px" onclick="addStep()">
        ${svgIcon('plus')} Aggiungi step
      </button>
    </div>

    <button class="btn btn-primary" style="margin-top:4px" onclick="saveRicetta()">
      Salva ricetta
    </button>

function renderStepItem(s, idx) {
  return `<div class="step-item" id="step-${idx}" draggable="true" data-idx="${idx}">
    <div class="step-actions">
      <button class="step-action-btn" style="cursor:grab" title="Trascina">${svgIcon('drag')}</button>
    </div>
    <div class="step-num">${idx + 1}</div>
    <div class="step-body">
      <textarea class="step-text-input" placeholder="Descrivi questo step…"
        oninput="updateStep(${idx},'text',this.value)">${s.text || ''}</textarea>
      <div class="step-time-row">
        <input type="number" placeholder="0" min="0" value="${s.time_min || ''}"
          oninput="updateStep(${idx},'time_min',+this.value)">
        <label>min</label>
      </div>
    </div>
    <div class="step-actions">
      <button class="step-action-btn" title="Duplica" onclick="dupStep(${idx})">${svgIcon('copy')}</button>
      <button class="step-action-btn" title="Elimina" onclick="removeStep(${idx})"
        style="color:var(--danger)">${svgIcon('trash')}</button>
    </div>
  </div>`;
}

function setRecipeType(t) {
  const state = saveRecipeFormState();
  newRecipeType = t;
  renderNuovaRicetta(document.getElementById('content'));
  restoreRecipeFormState(state);
}

function showIngDropdown() {
  const q = document.getElementById('ing-search').value.toLowerCase().trim();
  const dd = document.getElementById('ing-dropdown');
  const qRow = document.getElementById('qty-row');
  if (!q) { dd.style.display = 'none'; qRow.style.display = 'none'; return; }
  const matches = ingredients.filter(i => i.name.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length) { dd.innerHTML = `<div class="ing-option" style="color:var(--text3)">Nessun risultato</div>`; dd.style.display = 'block'; return; }
  dd.innerHTML = matches.map(i =>
    `<div class="ing-option" onclick="selectIngForRecipe('${i.id}','${i.name.replace(/'/g, "\\'")}')">
      ${i.name}
      <span style="color:var(--text3);font-size:12px;margin-left:6px">
        P${(i.protein_per_g*100).toFixed(0)} C${(i.carbs_per_g*100).toFixed(0)} G${(i.fat_per_g*100).toFixed(0)}
      </span>
    </div>`
  ).join('');
  dd.style.display = 'block';
}

function selectIngForRecipe(id, name) {
  selectedIngId = id;
  document.getElementById('ing-search').value = name;
  document.getElementById('ing-dropdown').style.display = 'none';
  document.getElementById('qty-row').style.display = 'block';
  document.getElementById('ing-qty').focus();
}

function addIngToRecipe() {
  const qty = parseFloat(document.getElementById('ing-qty').value);
  const imp = parseFloat(document.getElementById('ing-imp').value);
  if (!selectedIngId) { showToast('Seleziona prima un ingrediente'); return; }
  if (!qty || qty <= 0) { showToast('Inserisci una quantità valida'); return; }
  const state = saveRecipeFormState();
  newRecipeIngredients.push({ ingredient_id: selectedIngId, qty_g: qty, importance: imp });
  selectedIngId = null;
  renderNuovaRicetta(document.getElementById('content'));
  restoreRecipeFormState(state);
}

function removeIngFromRecipe(idx) {
  const state = saveRecipeFormState();
  newRecipeIngredients.splice(idx, 1);
  renderNuovaRicetta(document.getElementById('content'));
  restoreRecipeFormState(state);
}

function addStep() {
  const state = saveRecipeFormState();
  newRecipeSteps.push({ order: newRecipeSteps.length + 1, text: '', time_min: 0, notes: '' });
  renderNuovaRicetta(document.getElementById('content'));
  restoreRecipeFormState(state);
  setTimeout(() => {
    const items = document.querySelectorAll('.step-text-input');
    if (items.length) items[items.length - 1].focus();
  }, 50);
}

function updateStep(idx, key, val) {
  if (newRecipeSteps[idx]) newRecipeSteps[idx][key] = val;
}

function removeStep(idx) {
  const state = saveRecipeFormState();
  newRecipeSteps.splice(idx, 1);
  newRecipeSteps.forEach((s, i) => s.order = i + 1);
  renderNuovaRicetta(document.getElementById('content'));
  restoreRecipeFormState(state);
}

function dupStep(idx) {
  const state = saveRecipeFormState();
  const copy = { ...newRecipeSteps[idx] };
  newRecipeSteps.splice(idx + 1, 0, copy);
  newRecipeSteps.forEach((s, i) => s.order = i + 1);
  renderNuovaRicetta(document.getElementById('content'));
  restoreRecipeFormState(state);
}

function initDragDrop() {
  const list = document.getElementById('steps-list');
  if (!list) return;
  list.addEventListener('dragstart', e => {
    const item = e.target.closest('[data-idx]');
    if (item) { dragSrcIdx = +item.dataset.idx; e.dataTransfer.effectAllowed = 'move'; }
  });
  list.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
  });
  list.addEventListener('drop', e => {
    e.preventDefault();
    const item = e.target.closest('[data-idx]');
    if (!item || dragSrcIdx === null) return;
    const destIdx = +item.dataset.idx;
    if (dragSrcIdx === destIdx) return;
    const moved = newRecipeSteps.splice(dragSrcIdx, 1)[0];
    newRecipeSteps.splice(destIdx, 0, moved);
    newRecipeSteps.forEach((s, i) => s.order = i + 1);
    dragSrcIdx = null;
    renderNuovaRicetta(document.getElementById('content'));
  });
}

async function saveRicetta() {
  const name = document.getElementById('r-name').value.trim();
  if (!name) { showToast('Inserisci il nome della ricetta'); return; }
  if (newRecipeIngredients.length === 0) { showToast('Aggiungi almeno un ingrediente'); return; }
  const stepsValidi = newRecipeSteps.filter(s => s.text.trim());
  const recipe = {
    id: genId(name),
    name,
    type: newRecipeType,
    ingredients: newRecipeIngredients,
    steps: stepsValidi.map((s, i) => ({ ...s, order: i + 1 }))
  };
  await dbPut('recipes', recipe);
  recipes.push(recipe);
  // reset form
  newRecipeIngredients = [];
  newRecipeSteps = [];
  newRecipeType = 'meal';
  selectedIngId = null;
  showToast('✅ Ricetta salvata!');
  goTo('ricette');
}

function setScal(v) {
  scalabile = v;
  document.getElementById('scal-yes').classList.toggle('active', v);
  document.getElementById('scal-no').classList.toggle('active', !v);
}

function toggleGroup(id) {
  const idx = editingGroups.indexOf(id);
  if (idx >= 0) editingGroups.splice(idx, 1);
  else editingGroups.push(id);
  document.querySelectorAll('#groups-chips .group-chip').forEach(chip => {
    const gid = chip.getAttribute('onclick').match(/'([^']+)'/)[1];
    chip.classList.toggle('active', editingGroups.includes(gid));
  });
}

function toggleGroupsRef() {
  document.getElementById('groups-ref').classList.toggle('open');
}

function onMacroChange() {
  const P = parseFloat(document.getElementById('i-P').value) || 0;
  const C = parseFloat(document.getElementById('i-C').value) || 0;
  const F = parseFloat(document.getElementById('i-F').value) || 0;
  document.getElementById('i-kcal').value = ((P * 4) + (C * 4) + (F * 9)).toFixed(1);
}

async function saveIngrediente() {
  const name = document.getElementById('i-name').value.trim();
  if (!name) { showToast('Inserisci il nome'); return; }

  const P = parseFloat(document.getElementById('i-P').value);
  const C = parseFloat(document.getElementById('i-C').value);
  const F = parseFloat(document.getElementById('i-F').value);
  if (isNaN(P) || isNaN(C) || isNaN(F)) { showToast('Inserisci almeno proteine, carbo e grassi'); return; }

  const kcal  = parseFloat(document.getElementById('i-kcal').value)  || (P * 4 + C * 4 + F * 9);
  const fiber = parseFloat(document.getElementById('i-fiber').value) || 0;
  const sugar = parseFloat(document.getElementById('i-sugar').value) || 0;

  const customId = document.getElementById('i-id').value.trim();
  const id = customId || genId(name);

  // check ID duplicato
  if (ingredients.find(i => i.id === id)) {
    showToast('ID già esistente, cambiane uno personalizzato'); return;
  }

  // check nome duplicato (case insensitive, ignora spazi)
  const normalize = str => str.toLowerCase().replace(/\s+/g, '');
  const normalizedNew = normalize(name);
  const duplicate = ingredients.find(i => normalize(i.name) === normalizedNew);
  if (duplicate) {
    showToast(`⚠️ Esiste già "${duplicate.name}"`); return;
  }

  const ing = {
    id,
    name,
    protein_per_g:      P     / 100,
    carbs_per_g:        C     / 100,
    fat_per_g:          F     / 100,
    kcal_per_g:         kcal  / 100,
    fiber_per_g:        fiber / 100,
    sugar_per_g:        sugar / 100,
    groups:             [...editingGroups],
    default_importance: parseFloat(document.getElementById('i-imp').value),
    default_scalable:   scalabile,
  };

  await dbPut('ingredients', ing);
  ingredients.push(ing);

  // reset form state
  editingGroups = [];
  units = [];
  scalabile = true;

  showToast('✅ Ingrediente salvato!');
  goTo('ingredienti');
}

async function exportMerged() {
  // legge file esistente se fornito, altrimenti usa array vuoto
  async function readFileJSON(inputId) {
    const input = document.getElementById(inputId);
    if (!input || !input.files || !input.files[0]) return [];
    try {
      const text = await input.files[0].text();
      const parsed = JSON.parse(text);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      showToast('❌ Errore lettura file — controllalo');
      return [];
    }
  }
  async function importData() {
  const ingFile = document.getElementById('file-ing-import');
  const ricFile = document.getElementById('file-ric-import');

  if ((!ingFile || !ingFile.files[0]) && (!ricFile || !ricFile.files[0])) {
    showToast('Seleziona almeno un file da importare');
    return;
  }

  async function readJSON(input) {
    if (!input || !input.files || !input.files[0]) return [];
    try {
      const text = await input.files[0].text();
      const parsed = JSON.parse(text);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      showToast('❌ Errore lettura file — controllalo');
      return [];
    }
  }

  let addedI = 0, updatedI = 0, addedR = 0, updatedR = 0;

  const importedIngredients = await readJSON(ingFile);
  for (const ing of importedIngredients) {
    const exists = ingredients.find(x => x.id === ing.id);
    await dbPut('ingredients', ing);
    if (exists) { Object.assign(exists, ing); updatedI++; }
    else { ingredients.push(ing); addedI++; }
  }

  const importedRecipes = await readJSON(ricFile);
  for (const r of importedRecipes) {
    const exists = recipes.find(x => x.id === r.id);
    await dbPut('recipes', r);
    if (exists) { Object.assign(exists, r); updatedR++; }
    else { recipes.push(r); addedR++; }
  }

  showToast(`✅ +${addedI} ing, +${addedR} ric · aggiornati ${updatedI + updatedR}`);
  renderBackup(document.getElementById('content'));
}

  // merge per id: il dato locale vince sul file
  function mergeById(fromFile, fromDB) {
    const map = {};
    fromFile.forEach(x => map[x.id] = x);
    fromDB.forEach(x => map[x.id] = x); // sovrascrive con versione locale
    return Object.values(map);
  }

  function downloadJSON(data, filename) {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  const oldIngredients = await readFileJSON('file-ing-in');
  const oldRecipes     = await readFileJSON('file-ric-in');

  const mergedIngredients = mergeById(oldIngredients, ingredients);
  const mergedRecipes     = mergeById(oldRecipes, recipes);

  downloadJSON(mergedIngredients, 'ricettario_ingredienti.json');
  // piccolo delay per non bloccare il secondo download
  await new Promise(r => setTimeout(r, 400));
  downloadJSON(mergedRecipes, 'ricettario_ricette.json');

  showToast(`✅ Salvati: ${mergedIngredients.length} ing · ${mergedRecipes.length} ric`);
}

async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    let addedI = 0, updatedI = 0, addedR = 0, updatedR = 0;

    if (Array.isArray(data.ingredients)) {
      for (const ing of data.ingredients) {
        const exists = ingredients.find(x => x.id === ing.id);
        await dbPut('ingredients', ing);
        if (exists) { Object.assign(exists, ing); updatedI++; }
        else        { ingredients.push(ing);      addedI++;   }
      }
    }
    if (Array.isArray(data.recipes)) {
      for (const r of data.recipes) {
        const exists = recipes.find(x => x.id === r.id);
        await dbPut('recipes', r);
        if (exists) { Object.assign(exists, r); updatedR++; }
        else        { recipes.push(r);          addedR++;   }
      }
    }
    showToast(`+${addedI} ing, +${addedR} ric · aggiornati ${updatedI+updatedR}`);
    renderBackup(document.getElementById('content'));
  } catch (e) {
    showToast('❌ Errore: file JSON non valido');
  }
  event.target.value = '';
}

// ── PWA MANIFEST ──────────────────────────────────────────────────────────
function injectManifest() {
  const manifest = {
    name: 'Ricettario',
    short_name: 'Ricettario',
    start_url: '.',
    display: 'standalone',
    background_color: '#f7f5f0',
    theme_color: '#2d6a4f',
    icons: [{
      src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%232d6a4f"/><text y=".9em" font-size="80" x="10">🥗</text></svg>',
      sizes: '192x192',
      type: 'image/svg+xml'
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const link = document.createElement('link');
  link.rel  = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
}

// ── BOOT ──────────────────────────────────────────────────────────────────
async function boot() {
  injectManifest();
  await initDB();
  [ingredients, recipes] = await Promise.all([
    dbGetAll('ingredients'),
    dbGetAll('recipes')
  ]);
  render();
}

boot();
</script>
